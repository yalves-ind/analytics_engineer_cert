version: 2

models:
  - name: fct_sales
    description: "Tabela fato de vendas. Grão: linha do pedido (sales order detail). Contém métricas de quantidade, valor bruto e valor líquido."
    columns:
      - name: sales_order_detail_id
        description: "Identificador único da linha do pedido"
        tests:
          - unique
          - not_null
      - name: sales_order_id
        description: "Identificador do pedido"
        tests:
          - not_null
      - name: order_date
        description: "Data do pedido"
      - name: order_date_key
        description: "Chave para join com dim_date"
      - name: status
        description: "Status do pedido (1=In Process, 2=Approved, 3=Backordered, 4=Rejected, 5=Shipped, 6=Cancelled)"
      - name: customer_id
        description: "FK para dim_customer"
        tests:
          - not_null
      - name: address_id
        description: "FK para dim_address (endereço de envio)"
      - name: credit_card_id
        description: "FK para dim_credit_card"
      - name: product_id
        description: "FK para dim_product"
        tests:
          - not_null
      - name: order_qty
        description: "Quantidade comprada"
      - name: unit_price
        description: "Preço unitário do produto"
      - name: unit_price_discount
        description: "Percentual de desconto aplicado"
      - name: gross_amount
        description: "Valor bruto (unit_price * order_qty)"
      - name: net_amount
        description: "Valor líquido (unit_price * order_qty * (1 - discount))"

  - name: dim_customer
    description: "Dimensão de clientes com dados pessoais vindos de sales_customer e person_person."
    columns:
      - name: customer_id
        description: "Identificador único do cliente"
        tests:
          - unique
          - not_null
      - name: full_name
        description: "Nome completo do cliente"

  - name: dim_product
    description: "Dimensão de produtos com subcategoria e categoria, vindos de production_product, production_productsubcategory e production_productcategory."
    columns:
      - name: product_id
        description: "Identificador único do produto"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Nome do produto"
      - name: subcategory_name
        description: "Nome da subcategoria do produto"
      - name: category_name
        description: "Nome da categoria do produto"

  - name: dim_address
    description: "Dimensão de endereços com cidade, estado e país, vindos de person_address, person_stateprovince e person_countryregion."
    columns:
      - name: address_id
        description: "Identificador único do endereço"
        tests:
          - unique
          - not_null
      - name: city
        description: "Nome da cidade"
      - name: state_name
        description: "Nome do estado"
      - name: country_name
        description: "Nome do país"

  - name: dim_credit_card
    description: "Dimensão de cartões de crédito com tipo do cartão, vinda de sales_creditcard."
    columns:
      - name: credit_card_id
        description: "Identificador único do cartão"
        tests:
          - unique
          - not_null
      - name: card_type
        description: "Tipo do cartão de crédito"

  - name: dim_sales_reason
    description: "Dimensão de motivos de venda, vinda de sales_salesreason."
    columns:
      - name: sales_reason_id
        description: "Identificador único do motivo de venda"
        tests:
          - unique
          - not_null
      - name: sales_reason_name
        description: "Nome do motivo de venda"
      - name: reason_type
        description: "Tipo do motivo (Marketing, Promotion, Other)"

  - name: dim_date
    description: "Dimensão de datas gerada a partir das datas de pedido em sales_salesorderheader."
    columns:
      - name: date_key
        description: "Data como chave primária"
        tests:
          - unique
          - not_null
      - name: year
        description: "Ano"
      - name: month
        description: "Mês (número)"
      - name: month_name
        description: "Nome do mês"
      - name: quarter
        description: "Trimestre"

  - name: bridge_sales_order_reason
    description: "Bridge table entre pedidos e motivos de venda (relação N:N). Fonte: sales_salesorderheadersalesreason e sales_salesreason."
    columns:
      - name: sales_order_id
        description: "FK para fct_sales"
      - name: sales_reason_id
        description: "FK para dim_sales_reason"
      - name: sales_reason_name
        description: "Nome do motivo de venda"
